<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Coloring Book · by Claire</title>
  <meta name="description" content="A coloring app by Claire — click any Pokémon to paint it, with a flood-fill algorithm, undo, and a watercolour brush.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%234a90d9'/%3E%3Ccircle cx='11' cy='12' r='4' fill='%23cfe8ff'/%3E%3C/svg%3E">
  <style>
    /* ====== "Dreamy Watercolor Blue" — same look as Claire's homepage ====== */
    :root {
      --ink:#1c3a5e; --ink-soft:#4a6585; --blue:#2b6cb0; --blue-deep:#1f5290;
      --blue-bright:#4a90d9; --sky:#a8d8ea; --wash:#cfe8ff; --mist:#e3f2fd;
      --paper:#f4f9ff; --card:#ffffff;
      --shadow:0 10px 30px rgba(43,108,176,0.14); --shadow-sm:0 4px 14px rgba(43,108,176,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background-color: var(--paper);
      background-image:
        radial-gradient(36rem 36rem at 6% -5%,  rgba(168,216,234,0.55), transparent 60%),
        radial-gradient(30rem 30rem at 100% 6%, rgba(207,232,255,0.65), transparent 60%),
        radial-gradient(34rem 34rem at 102% 96%, rgba(168,216,234,0.40), transparent 60%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 36px;
      -webkit-font-smoothing: antialiased;
    }

    h1, button, #pokemon-select, #watercolor-label, .btn-back {
      font-family: 'Fredoka', 'Nunito', sans-serif;
    }

    /* back to Claire's website */
    .topbar { width: 100%; max-width: 560px; margin-bottom: 12px; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.8); color: var(--blue-deep);
      font-weight: 700; font-size: 0.88rem;
      padding: 8px 16px; border-radius: 999px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.12s, background 0.15s;
      text-decoration: none;
    }
    .btn-back:hover { transform: translateX(-3px); background: #fff; }

    #app { width: 100%; max-width: 560px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 22px; color: var(--blue-deep); font-weight: 700;
      letter-spacing: 0.3px; flex-shrink: 0;
    }

    #pokemon-select {
      padding: 7px 12px;
      border-radius: 16px;
      border: 2px solid var(--sky);
      background: #fff;
      color: var(--blue-deep);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #pokemon-select:hover { border-color: var(--blue-bright); }

    .btn-row { display: flex; gap: 8px; flex-shrink: 0; }

    button {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: filter 0.12s, transform 0.1s;
    }
    button:hover { filter: brightness(0.94); transform: translateY(-2px); }
    button:active { transform: scale(0.96); }
    #undo-btn  { background: var(--mist);  color: var(--blue-deep); }
    #reset-btn { background: var(--wash);  color: var(--blue-deep); }
    #save-btn  { background: var(--blue);  color: #fff; box-shadow: var(--shadow-sm); }
    button:disabled { opacity: 0.4; cursor: default; transform: none; filter: none; }

    #watercolor-row {
      display: flex; align-items: center; justify-content: center; margin-top: 14px;
    }
    #watercolor-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; font-weight: 700;
      color: var(--blue-deep);
      background: #fff;
      border: 2px solid var(--sky);
      border-radius: 999px;
      padding: 6px 16px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
      box-shadow: var(--shadow-sm);
    }
    #watercolor-label:hover { background: var(--mist); border-color: var(--blue-bright); }
    #watercolor-label.active { background: var(--blue); color: #fff; border-color: var(--blue-deep); }
    #watercolor-cb { display: none; }

    #hint {
      text-align: center; font-size: 12.5px; color: var(--ink-soft);
      font-weight: 600; margin-bottom: 10px; min-height: 16px;
    }

    #workspace {
      background: #fff;
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
      cursor: crosshair;
    }
    #canvas { width: 100%; height: auto; display: block; }

    #palette { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; }

    .swatch {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2.5px solid rgba(28,58,94,0.18);
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .swatch:hover { transform: scale(1.22); box-shadow: 0 3px 10px rgba(28,58,94,0.22); }
    .swatch.selected {
      border-color: var(--blue-bright); border-width: 3px;
      transform: scale(1.15); box-shadow: 0 0 0 3px rgba(74,144,217,0.35);
    }

    #custom-color {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2.5px solid rgba(28,58,94,0.18);
      padding: 2px; cursor: pointer; background: none;
      overflow: hidden; flex-shrink: 0; transition: transform 0.1s;
    }
    #custom-color:hover { transform: scale(1.22); }
    #custom-color::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
    #custom-color::-webkit-color-swatch { border: none; border-radius: 50%; }
    #custom-color::-moz-color-swatch { border: none; border-radius: 50%; }

    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: var(--ink-soft); font-size: 14px; font-weight: 700;
    }

    .credit {
      text-align: center; margin-top: 18px; font-size: 12px;
      color: var(--ink-soft); font-weight: 600;
    }
    .credit a { color: var(--blue); font-weight: 800; text-decoration: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <!-- ↓ Claire: this points back to your homepage. Update it to your live website link if needed. -->
    <a class="btn-back" href="../website/index.html">← Back to Claire's site</a>
  </div>
<div id="app">
  <header>
    <h1>🎨 Pokémon Coloring Book</h1>
    <select id="pokemon-select">
      <option value="sylveon">Sylveon</option>
      <option value="eevee">Eevee</option>
      <option value="flareon">Flareon</option>
      <option value="espeon">Espeon</option>
      <option value="umbreon">Umbreon</option>
      <option value="vaporeon">Vaporeon</option>
      <option value="glaceon">Glaceon</option>
      <option value="leafeon">Leafeon</option>
      <option value="jolteon">Jolteon</option>
    </select>
    <div class="btn-row">
      <button id="undo-btn" disabled>Undo</button>
      <button id="reset-btn">Reset</button>
      <button id="save-btn">Save PNG</button>
    </div>
  </header>

  <div id="hint">Pick a color below, then click any region to paint it!</div>

  <div id="workspace">
    <div id="loading">Loading...</div>
    <canvas id="canvas" style="display:none"></canvas>
  </div>

  <div id="palette">
    <div class="swatch selected" style="background:#FFF9F0" data-color="#FFF9F0" title="Cream"></div>
    <div class="swatch" style="background:#FFFFFF;border-color:#ccc" data-color="#FFFFFF" title="White"></div>
    <div class="swatch" style="background:#F5DC6A" data-color="#F5DC6A" title="Warm Yellow"></div>
    <div class="swatch" style="background:#E06020" data-color="#E06020" title="Flame Orange"></div>
    <div class="swatch" style="background:#CC3308" data-color="#CC3308" title="Fire Red"></div>
    <div class="swatch" style="background:#D4A860" data-color="#D4A860" title="Sandy Tan"></div>
    <div class="swatch" style="background:#C68642" data-color="#C68642" title="Brown"></div>
    <div class="swatch" style="background:#8B4513" data-color="#8B4513" title="Dark Brown"></div>
    <div class="swatch" style="background:#FFDCE8" data-color="#FFDCE8" title="Light Pink"></div>
    <div class="swatch" style="background:#E87FAB" data-color="#E87FAB" title="Medium Pink"></div>
    <div class="swatch" style="background:#C9A0DC" data-color="#C9A0DC" title="Lavender"></div>
    <div class="swatch" style="background:#A8D8EA" data-color="#A8D8EA" title="Sky Blue"></div>
    <div class="swatch" style="background:#4A90D9" data-color="#4A90D9" title="Blue"></div>
    <div class="swatch" style="background:#7EC850" data-color="#7EC850" title="Green"></div>
    <div class="swatch" style="background:#2C3E50" data-color="#2C3E50" title="Dark Navy"></div>
    <div class="swatch" style="background:#222" data-color="#222222" title="Dark"></div>
    <input type="color" id="custom-color" value="#4a90d9" title="Custom color">
  </div>
  <div id="watercolor-row">
    <label id="watercolor-label" for="watercolor-cb">
      <input type="checkbox" id="watercolor-cb"> Watercolor
    </label>
  </div>
    <p class="credit">Designed by <strong>Claire</strong> and Chloe · <a href="https://github.com/clairehjx/pokemon-coloring-book" target="_blank" rel="noopener">View the code ↗</a></p>

const MAX_UNDO = 20;
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });

let currentColor      = '#FFF9F0';
let watercolorMode    = false;
let undoStack         = [];
let originalImageData = null;

// ── Load a Pokémon ─────────────────────────────────────────────────────────
function loadPokemon(name) {
  const cfg = IMAGES[name];
  document.getElementById('loading').style.display = 'flex';
  canvas.style.display = 'none';
  undoStack = [];
  document.getElementById('undo-btn').disabled = true;

  canvas.width  = cfg.w;
  canvas.height = cfg.h;

  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, cfg.w, cfg.h);
    originalImageData = ctx.getImageData(0, 0, cfg.w, cfg.h);
    document.getElementById('loading').style.display = 'none';
    canvas.style.display = 'block';
  };
  img.src = cfg.b64;
}

loadPokemon('sylveon');

document.getElementById('pokemon-select').addEventListener('change', e => {
  loadPokemon(e.target.value);
});

// ── Color utils ────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const v = parseInt(hex.replace('#', ''), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}

function isDark(r, g, b) {
  return (0.299 * r + 0.587 * g + 0.114 * b) < 100;
}

// ── Flood fill ─────────────────────────────────────────────────────────────
function floodFill(startX, startY) {
  const [fillR, fillG, fillB] = hexToRgb(currentColor);
  const cw = canvas.width, ch = canvas.height;
  const imageData = ctx.getImageData(0, 0, cw, ch);
  const data = imageData.data;

  const si = (startY * cw + startX) * 4;
  const targetR = data[si], targetG = data[si + 1], targetB = data[si + 2];

  if (isDark(targetR, targetG, targetB)) return false;
  if (!watercolorMode && targetR === fillR && targetG === fillG && targetB === fillB) return false;

  undoStack.push(ctx.getImageData(0, 0, cw, ch));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  document.getElementById('undo-btn').disabled = false;

  const visited = new Uint8Array(cw * ch);
  const region  = [];
  const queue   = [];
  const sp      = startY * cw + startX;
  queue.push(sp);
  visited[sp] = 1;

  let head = 0;
  while (head < queue.length) {
    const pos = queue[head++];
    region.push(pos);
    const x = pos % cw, y = (pos / cw) | 0;

    const nbrs = [
      x > 0      ? pos - 1  : -1,
      x < cw - 1 ? pos + 1  : -1,
      y > 0      ? pos - cw : -1,
      y < ch - 1 ? pos + cw : -1,
    ];
    for (const np of nbrs) {
      if (np < 0 || visited[np]) continue;
      visited[np] = 1;
      const ni = np * 4;
      const nr = data[ni], ng = data[ni + 1], nb = data[ni + 2];
      if (isDark(nr, ng, nb)) continue;
      if (Math.abs(nr - targetR) < 40 &&
          Math.abs(ng - targetG) < 40 &&
          Math.abs(nb - targetB) < 40) {
        queue.push(np);
      }
    }
  }

  if (watercolorMode) {
    for (const pos of region) {
      const pi = pos * 4;
      const x = pos % cw, y = (pos / cw) | 0;
      let nearEdge = false;
      outer: for (let dx = -2; dx <= 2; dx++) {
        for (let dy = -2; dy <= 2; dy++) {
          if (dx === 0 && dy === 0) continue;
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= cw || ny < 0 || ny >= ch) continue;
          const ni = (ny * cw + nx) * 4;
          if (isDark(data[ni], data[ni+1], data[ni+2])) { nearEdge = true; break outer; }
        }
      }
      const base    = nearEdge ? 0.70 : 0.52;
      const opacity = Math.max(0.20, Math.min(0.88, base + (Math.random() - 0.5) * 0.22));
      data[pi]   = Math.round(fillR * opacity + 255 * (1 - opacity));
      data[pi+1] = Math.round(fillG * opacity + 255 * (1 - opacity));
      data[pi+2] = Math.round(fillB * opacity + 255 * (1 - opacity));
    }
  } else {
    for (const pos of region) {
      const pi = pos * 4;
      data[pi] = fillR; data[pi + 1] = fillG; data[pi + 2] = fillB;
    }
  }

  ctx.putImageData(imageData, 0, 0);
  return true;
}

// ── Canvas click ───────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX);
  const y = Math.floor((e.clientY - rect.top)  * scaleY);
  if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;
  floodFill(x, y);
});

// ── Palette ────────────────────────────────────────────────────────────────
const swatches = document.querySelectorAll('.swatch');
function selectSwatch(sw) {
  swatches.forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
  currentColor = sw.dataset.color;
  document.getElementById('custom-color').value = currentColor;
}
swatches.forEach(sw => sw.addEventListener('click', () => selectSwatch(sw)));

const picker = document.getElementById('custom-color');
picker.addEventListener('input', () => {
  currentColor = picker.value;
  swatches.forEach(s => s.classList.remove('selected'));
});

// ── Watercolor toggle ─────────────────────────────────────────────────────
document.getElementById('watercolor-cb').addEventListener('change', function() {
  watercolorMode = this.checked;
  document.getElementById('watercolor-label').classList.toggle('active', this.checked);
});

// ── Undo ───────────────────────────────────────────────────────────────────
document.getElementById('undo-btn').addEventListener('click', () => {
  if (!undoStack.length) return;
  ctx.putImageData(undoStack.pop(), 0, 0);
  if (!undoStack.length) document.getElementById('undo-btn').disabled = true;
});

// ── Reset ──────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!originalImageData) return;
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  document.getElementById('undo-btn').disabled = false;
  ctx.putImageData(originalImageData, 0, 0);
});

// ── Save PNG ───────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', () => {
  const a = document.createElement('a');
  const name = document.getElementById('pokemon-select').value;
  a.download = name + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
